server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    gzip on;
    gzip_types text/plain application/javascript text/css application/json;
    location ~* \.(js|css|svg|png|jpg|woff2)$ {
        expires 1d;
        add_header Cache-Control "public, immutable";
    }
    location / {
        try_files $uri $uri/ /index.html;
    }
}